<div class="page-container">
  <div class="page-header">
    <h2>{{ isEdit ? 'Modifier le paiement' : 'Nouveau paiement' }}</h2>
    <a routerLink="/paiements" class="btn btn-secondary">← Retour</a>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">

    <div class="form-row">
      <div class="form-group">
        <label>Référence *</label>
        <input formControlName="reference" placeholder="PAI-001" [ngClass]="{'invalid-input': form.get('reference')?.invalid && form.get('reference')?.touched}">
        <small class="error-text" *ngIf="form.get('reference')?.invalid && form.get('reference')?.touched">
          La référence est requise.
        </small>
      </div>
      <div class="form-group">
        <label>Date de paiement *</label>
        <input type="date" formControlName="date_paiement" [ngClass]="{'invalid-input': form.get('date_paiement')?.invalid && form.get('date_paiement')?.touched}">
        <small class="error-text" *ngIf="form.get('date_paiement')?.invalid && form.get('date_paiement')?.touched">
          La date de paiement est requise.
        </small>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Montant (FCFA) *</label>
        <input type="number" formControlName="montant" [ngClass]="{'invalid-input': form.get('montant')?.invalid && form.get('montant')?.touched}">
        <small class="error-text" *ngIf="form.get('montant')?.invalid && form.get('montant')?.touched">
          Le montant est requis et doit être > 0.
        </small>
      </div>
      <div class="form-group">
        <label>Mois concerné *</label>
        <input formControlName="mois_concerne" placeholder="ex: Janvier 2024" [ngClass]="{'invalid-input': form.get('mois_concerne')?.invalid && form.get('mois_concerne')?.touched}">
        <small class="error-text" *ngIf="form.get('mois_concerne')?.invalid && form.get('mois_concerne')?.touched">
          Le mois concerné est requis.
        </small>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Mode de paiement *</label>
        <select formControlName="mode_paiement">
          <option value="ESPECES">Espèces</option>
          <option value="VIREMENT">Virement</option>
          <option value="CHEQUE">Chèque</option>
          <option value="WAVE">Wave</option>
          <option value="ORANGE_MONEY">Orange Money</option>
        </select>
      </div>
      <div class="form-group">
        <label>Statut *</label>
        <select formControlName="statut">
          <option value="PAYE">Payé</option>
          <option value="PARTIEL">Partiel</option>
          <option value="EN_ATTENTE">En attente</option>
          <option value="IMPAYE">Impayé</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Filtrer par Locataire</label>
        <select [(ngModel)]="selectedLocataireId" [ngModelOptions]="{standalone: true}" (change)="onLocataireChange($event)">
          <option [value]="null">-- Tous les locataires --</option>
          <option *ngFor="let l of locataires" [value]="l.id_locataire">{{ l.prenom }} {{ l.nom }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Filtrer par Propriétaire</label>
        <select [(ngModel)]="selectedProprietaireId" [ngModelOptions]="{standalone: true}" (change)="onProprietaireChange($event)">
          <option [value]="null">-- Tous les propriétaires --</option>
          <option *ngFor="let p of proprietaires" [value]="p.id_proprietaire">{{ p.prenom }} {{ p.nom }}</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Contrat *</label>
        <select formControlName="id_contrat" [ngClass]="{'invalid-input': form.get('id_contrat')?.invalid && form.get('id_contrat')?.touched}">
          <option [value]="null">-- Sélectionner un contrat --</option>
          <option *ngFor="let c of contrats" [value]="c.id_contrat">{{ c.reference }}</option>
        </select>
        <small class="error-text" *ngIf="form.get('id_contrat')?.invalid && form.get('id_contrat')?.touched">
          Un contrat est requis.
        </small>
      </div>
      <div class="form-group">
        <label>Note</label>
        <textarea formControlName="notes" rows="2"></textarea>
      </div>
    </div>

    <div class="alert alert-danger" *ngIf="erreur">{{ erreur }}</div>

    <div class="form-actions">
      <a routerLink="/paiements" class="btn btn-secondary">Annuler</a>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Enregistrement...' : (isEdit ? 'Modifier' : 'Créer') }}
      </button>
    </div>

  </form>
</div>
