<div class="page-container" [ngClass]="{'embedded-form': isEmbedded}">
  <div class="page-header" *ngIf="!isEmbedded">
    <h2>{{ isEdit ? 'Modifier le bien' : 'Nouveau bien' }}</h2>
    <a routerLink="/biens" class="btn btn-secondary">← Retour</a>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">

    <div class="form-row">
      <div class="form-group">
        <label>Référence *</label>
        <input formControlName="reference" placeholder="BIEN-001" [ngClass]="{'invalid-input': form.get('reference')?.invalid && form.get('reference')?.touched}">
        <small class="error-text" *ngIf="form.get('reference')?.invalid && form.get('reference')?.touched">
          La référence est requise.
        </small>
      </div>
      <div class="form-group">
        <label>Type *</label>
        <select formControlName="type">
          <option value="APPARTEMENT">Appartement</option>
          <option value="MAISON">Maison</option>
          <option value="TERRAIN">Terrain</option>
          <option value="IMMEUBLE">Immeuble</option>
          <option value="STUDIO">Studio</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Adresse *</label>
        <input formControlName="adresse" placeholder="123 Rue..." [ngClass]="{'invalid-input': form.get('adresse')?.invalid && form.get('adresse')?.touched}">
        <small class="error-text" *ngIf="form.get('adresse')?.invalid && form.get('adresse')?.touched">
          L'adresse est requise.
        </small>
      </div>
      <div class="form-group">
        <label>Ville *</label>
        <input formControlName="ville" placeholder="Dakar" [ngClass]="{'invalid-input': form.get('ville')?.invalid && form.get('ville')?.touched}">
        <small class="error-text" *ngIf="form.get('ville')?.invalid && form.get('ville')?.touched">
          La ville est requise.
        </small>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Surface (m²) *</label>
        <input type="number" formControlName="surface" [ngClass]="{'invalid-input': form.get('surface')?.invalid && form.get('surface')?.touched}">
        <small class="error-text" *ngIf="form.get('surface')?.invalid && form.get('surface')?.touched">
          La surface est requise et doit être > 0.
        </small>
      </div>
      <div class="form-group">
        <label>Loyer mensuel (FCFA) *</label>
        <input type="number" formControlName="loyer_mensuel" [ngClass]="{'invalid-input': form.get('loyer_mensuel')?.invalid && form.get('loyer_mensuel')?.touched}">
        <small class="error-text" *ngIf="form.get('loyer_mensuel')?.invalid && form.get('loyer_mensuel')?.touched">
          Le loyer est requis et doit être > 0.
        </small>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Statut *</label>
        <select formControlName="statut">
          <option value="LIBRE">Libre</option>
          <option value="OCCUPE">Occupé</option>
          <option value="RESERVE">Réservé</option>
        </select>
      </div>
      <div class="form-group">
        <label>Propriétaire *</label>
        <select formControlName="id_proprietaire" [ngClass]="{'invalid-input': form.get('id_proprietaire')?.invalid && form.get('id_proprietaire')?.touched}">
          <option [value]="null">-- Sélectionner --</option>
          <option *ngFor="let p of proprietaires" [value]="p.id_proprietaire || p.id">
            {{ p.nom }} {{ p.prenom }}
          </option>
        </select>
        <small class="error-text" *ngIf="form.get('id_proprietaire')?.invalid && form.get('id_proprietaire')?.touched">
          Sélectionnez un propriétaire.
        </small>
      </div>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea formControlName="description" rows="3"></textarea>
    </div>

    <div class="alert alert-danger" *ngIf="erreur">{{ erreur }}</div>

    <div class="form-actions">
      <a routerLink="/biens" class="btn btn-secondary" *ngIf="!isEmbedded">Annuler</a>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Enregistrement...' : (isEdit ? 'Enregistrer les modifications' : 'Créer') }}
      </button>
    </div>

  </form>
</div>
