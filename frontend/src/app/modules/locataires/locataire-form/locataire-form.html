<div class="page-container" [ngClass]="{'embedded-form': isEmbedded}">
  <div class="page-header" *ngIf="!isEmbedded">
    <h2>{{ isEdit ? 'Modifier le locataire' : 'Nouveau locataire' }}</h2>
    <a routerLink="/locataires" class="btn btn-secondary">← Retour</a>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">

    <div class="form-row">
      <div class="form-group">
        <label>Nom *</label>
        <input formControlName="nom" placeholder="Nom" [ngClass]="{'invalid-input': form.get('nom')?.invalid && form.get('nom')?.touched}">
        <small class="error-text" *ngIf="form.get('nom')?.invalid && form.get('nom')?.touched">
          Le nom est requis.
        </small>
      </div>
      <div class="form-group">
        <label>Prénom *</label>
        <input formControlName="prenom" placeholder="Prénom" [ngClass]="{'invalid-input': form.get('prenom')?.invalid && form.get('prenom')?.touched}">
        <small class="error-text" *ngIf="form.get('prenom')?.invalid && form.get('prenom')?.touched">
          Le prénom est requis.
        </small>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Téléphone *</label>
        <input formControlName="telephone" placeholder="Numéro de téléphone" [ngClass]="{'invalid-input': form.get('telephone')?.invalid && form.get('telephone')?.touched}">
        <small class="error-text" *ngIf="form.get('telephone')?.invalid && form.get('telephone')?.touched">
          Le téléphone est requis.
        </small>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" formControlName="email" placeholder="email@exemple.com" [ngClass]="{'invalid-input': form.get('email')?.invalid && form.get('email')?.touched}">
        <small class="error-text" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Un email valide est requis.
        </small>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Adresse *</label>
        <input formControlName="adresse" placeholder="Adresse complète" [ngClass]="{'invalid-input': form.get('adresse')?.invalid && form.get('adresse')?.touched}">
        <small class="error-text" *ngIf="form.get('adresse')?.invalid && form.get('adresse')?.touched">
          L'adresse est requise.
        </small>
      </div>
      <div class="form-group">
        <label>Profession *</label>
        <input formControlName="profession" placeholder="Profession" [ngClass]="{'invalid-input': form.get('profession')?.invalid && form.get('profession')?.touched}">
        <small class="error-text" *ngIf="form.get('profession')?.invalid && form.get('profession')?.touched">
          La profession est requise.
        </small>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>CNI *</label>
        <input formControlName="cni" placeholder="Numéro CNI" [ngClass]="{'invalid-input': form.get('cni')?.invalid && form.get('cni')?.touched}">
        <small class="error-text" *ngIf="form.get('cni')?.invalid && form.get('cni')?.touched">
          La CNI est requise.
        </small>
      </div>
    </div>

    <div class="alert alert-danger" *ngIf="erreur">{{ erreur }}</div>

    <div class="form-actions">
      <a routerLink="/locataires" class="btn btn-secondary" *ngIf="!isEmbedded">Annuler</a>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Enregistrement...' : (isEdit ? 'Enregistrer les modifications' : 'Créer') }}
      </button>
    </div>

  </form>
</div>
