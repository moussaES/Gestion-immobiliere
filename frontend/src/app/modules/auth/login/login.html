<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <h1>Étoiles du Sine</h1>
      <p>Connectez-vous à votre espace</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" formControlName="email" placeholder="vous@email.com">
        <span class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Email invalide
        </span>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-icon">
          <input [type]="showPass ? 'text' : 'password'"
                 formControlName="password" placeholder="••••••••">
          <span (click)="showPass = !showPass" class="toggle-pass">
            {{ showPass ? '🙈' : '👁️' }}
          </span>
        </div>
        <span class="error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Minimum 6 caractères
        </span>
      </div>

      <div class="alert alert-danger" *ngIf="erreur">{{ erreur }}</div>

      <button type="submit" class="btn-login" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>

    </form>
  </div>
</div>
